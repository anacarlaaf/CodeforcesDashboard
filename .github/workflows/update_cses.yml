name: Update CSES

on:

  workflow_dispatch:

  schedule:
    - cron: '0 3 * * *'

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Rodar script
        run: |
          python update_cses.py